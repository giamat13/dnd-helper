<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ארגז הכלים של ההרפתקן — כלי ניהול D&D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Assistant:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12151f;
    --bg-alt: #0d0f17;
    --panel: #1c2130;
    --panel-2: #242b3f;
    --panel-3: #2c3449;
    --line: #3a4258;
    --line-soft: #2a3146;
    --ink: #ece6d6;
    --ink-dim: #a8a496;
    --ink-faint: #706c60;
    --gold: #d4a24c;
    --gold-bright: #f0c674;
    --gold-dim: #8a6a34;
    --combat: #c1443c;
    --combat-bg: #2c1917;
    --combat-line: #5a2b26;
    --nature: #57946a;
    --nature-bg: #16241c;
    --nature-line: #2c4a37;
    --utility: #5b93bd;
    --utility-bg: #16222c;
    --utility-line: #2c4457;
    --danger: #c1443c;
    --success: #57946a;
    --font-display: 'Frank Ruhl Libre', 'David Libre', serif;
    --font-body: 'Assistant', 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --radius: 10px;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 15% 0%, rgba(212,162,76,0.06), transparent 55%),
      radial-gradient(ellipse at 85% 100%, rgba(87,148,106,0.05), transparent 55%);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  ::selection{ background: var(--gold-dim); color: var(--ink); }

  input, select, textarea, button{ font-family: inherit; }

  /* ---------- header ---------- */
  header.top{
    background: linear-gradient(180deg, var(--bg-alt), var(--bg));
    border-bottom: 1px solid var(--line-soft);
    padding: 28px 24px 0;
  }
  .top-inner{ max-width: 1180px; margin: 0 auto; }
  .top-title-row{
    display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
    margin-bottom: 4px;
  }
  h1.brand{
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 30px;
    margin:0;
    color: var(--gold-bright);
    letter-spacing: 0.5px;
  }
  .brand-sub{
    font-size: 13px;
    color: var(--ink-faint);
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
  }
  .top-desc{
    color: var(--ink-dim);
    font-size: 14px;
    margin: 2px 0 20px;
  }

  /* ---------- tab nav ---------- */
  nav.tabs{
    display:flex; gap:6px; overflow-x:auto;
    padding-bottom: 0;
  }
  nav.tabs::-webkit-scrollbar{ height:0; }
  .tab-btn{
    display:flex; align-items:center; gap:8px;
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    color: var(--ink-faint);
    padding: 11px 18px 12px;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    font-size: 14.5px;
    font-weight: 600;
    white-space: nowrap;
    transition: color .15s, background .15s;
  }
  .tab-btn .dot{
    width:8px; height:8px; border-radius:50%;
    background: currentColor; opacity: .55; flex-shrink:0;
  }
  .tab-btn:hover{ color: var(--ink); }
  .tab-btn.active{
    color: var(--ink);
    background: var(--panel);
    border-color: var(--line-soft);
  }
  .tab-btn.active .dot{ background: var(--gold); opacity:1; }

  /* ---------- main ---------- */
  main{
    max-width: 1180px; margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--line-soft);
    border-radius: 0 0 14px 14px;
    padding: 26px 24px 40px;
    min-height: 60vh;
  }
  section.pane{ display:none; }
  section.pane.active{ display:block; animation: fade .18s ease; }
  @keyframes fade{ from{ opacity:0; transform: translateY(3px);} to{opacity:1; transform:none;} }

  h2.pane-title{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    color: var(--gold-bright);
    margin: 0 0 4px;
  }
  p.pane-note{
    color: var(--ink-dim); font-size: 13.5px; margin: 0 0 22px;
  }

  .grid2{ display:grid; grid-template-columns: 1.15fr 1fr; gap: 20px; }
  .grid3{ display:grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
  @media(max-width: 860px){ .grid2, .grid3{ grid-template-columns: 1fr; } }

  .card{
    background: var(--panel-2);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .card + .card{ margin-top: 14px; }
  .card h3{
    font-family: var(--font-display);
    font-size: 16.5px;
    margin: 0 0 12px;
    color: var(--ink);
    font-weight: 700;
    display:flex; align-items:center; gap:8px;
  }
  .card h3 small{
    font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); font-weight: 400;
  }

  label.field-label{
    display:block; font-size: 12.5px; color: var(--ink-dim); margin-bottom:4px;
  }
  input[type=text], input[type=number], select{
    width:100%;
    background: var(--panel-3);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 7px;
    padding: 8px 10px;
    font-size: 14px;
  }
  input[type=text]:focus, input[type=number]:focus, select:focus{
    outline: none; border-color: var(--gold-dim); box-shadow: 0 0 0 2px rgba(212,162,76,0.15);
  }
  .row{ display:flex; gap:10px; flex-wrap: wrap; align-items:flex-end; }
  .row > div{ flex:1; min-width: 90px; }
  .row.tight > div{ min-width: 70px; }

  button.btn{
    background: var(--panel-3);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 9px 16px;
    border-radius: 7px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .05s;
  }
  button.btn:hover{ background: #333c55; border-color: var(--gold-dim); }
  button.btn:active{ transform: scale(0.97); }
  button.btn.gold{ background: var(--gold-dim); border-color: var(--gold); color: #1a1408; }
  button.btn.gold:hover{ background: var(--gold); }
  button.btn.danger{ border-color: var(--combat-line); color: #f0a29c; }
  button.btn.danger:hover{ background: var(--combat-bg); }
  button.btn.success{ border-color: var(--nature-line); color: #a9d8b6; }
  button.btn.success:hover{ background: var(--nature-bg); }
  button.btn.small{ padding: 5px 10px; font-size: 12px; }
  button.btn.icon-only{ padding: 6px 9px; }
  button.btn:disabled{ opacity:.4; cursor:not-allowed; }

  .chip-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 14px; }
  .chip{
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight:600;
    border: 1px solid var(--line); color: var(--ink-dim); cursor:pointer;
    background: var(--panel-3);
  }
  .chip.active{ color: var(--ink); border-color: currentColor; }

  .spell-item{
    display:flex; align-items:center; gap:12px;
    padding: 10px 12px; margin-bottom: 8px;
    background: var(--panel-3);
    border-right: 4px solid var(--gold-dim);
    border-radius: 6px;
    flex-wrap: wrap;
  }
  .spell-item .name{ font-weight:700; flex:1; }
  .spell-item .lvl{
    font-family: var(--font-mono); font-size: 12px; color: var(--ink-faint);
    background: var(--panel); padding: 2px 8px; border-radius: 5px;
  }
  .spell-item .note{ font-size:12px; color: var(--ink-dim); flex:2; }
  .spell-tags-input{
    flex: 1 1 160px; min-width: 140px;
    background: var(--panel); border: 1px solid var(--line); color: var(--ink);
    border-radius: 6px; padding: 5px 9px; font-size: 12.5px;
  }
  .spell-tags-input:focus{ outline:none; border-color: var(--gold-dim); }

  .empty-state{
    color: var(--ink-faint); font-size: 13.5px; text-align:center;
    padding: 22px 10px; border: 1px dashed var(--line); border-radius: 8px;
  }

  .slot-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .slot-row .lvl-label{
    font-family: var(--font-mono); width: 58px; color: var(--ink-dim); font-size:13px;
  }
  .slot-pips{ display:flex; gap:5px; flex:1; flex-wrap:wrap; }
  .pip{
    width:20px; height:20px; border-radius:4px; border:1px solid var(--line);
    background: var(--panel); cursor:pointer; flex-shrink:0;
  }
  .pip.used{ background: var(--gold-dim); border-color: var(--gold); }
  .slot-max-input{ width:52px !important; text-align:center; }

  .recommend-box{
    background: var(--utility-bg); border: 1px solid var(--utility-line);
    border-radius: 8px; padding: 14px 16px; margin-top: 6px;
  }
  .recommend-box .title{ color: var(--utility); font-weight:700; font-size: 13px; margin-bottom:6px; }
  .recommend-box .spell-name{ font-family: var(--font-display); font-size:19px; color: var(--ink); }
  .recommend-box .spell-meta{ font-size: 12.5px; color: var(--ink-dim); margin-top:2px; }

  .result-box{
    background: var(--panel-3); border: 1px solid var(--line);
    border-radius: 8px; padding: 14px 16px; margin-top: 10px;
    display:flex; gap: 24px; flex-wrap:wrap;
  }
  .result-box .stat{ text-align:center; }
  .result-box .stat .num{
    font-family: var(--font-mono); font-size: 26px; font-weight:700; color: var(--gold-bright);
  }
  .result-box .stat .lbl{ font-size: 11.5px; color: var(--ink-dim); margin-top:2px; }

  table.simple{ width:100%; border-collapse: collapse; font-size: 13.5px; }
  table.simple th{ text-align: right; color: var(--ink-faint); font-weight:600; font-size:11.5px; padding: 4px 8px; border-bottom: 1px solid var(--line); }
  table.simple td{ padding: 7px 8px; border-bottom: 1px solid var(--line-soft); }
  table.simple tr:last-child td{ border-bottom:none; }

  .list-item{
    display:flex; align-items:center; gap:10px;
    background: var(--panel-3); border-radius: 7px; padding: 9px 12px; margin-bottom:8px;
  }
  .list-item .grow{ flex:1; }
  .uses-track{ display:flex; gap:4px; }
  .use-pip{ width:16px; height:16px; border-radius:50%; background: var(--panel); border:1px solid var(--line); }
  .use-pip.spent{ background: var(--combat); border-color: var(--combat); }

  .badge{ display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:700; font-family: var(--font-mono); }
  .badge.short{ background: var(--utility-bg); color: var(--utility); border:1px solid var(--utility-line); }
  .badge.long{ background: var(--nature-bg); color: var(--nature); border:1px solid var(--nature-line); }
  .badge.day{ background: var(--panel); color: var(--gold-bright); border:1px solid var(--gold-dim); font-weight:600; }

  .attack-row{ background: var(--panel-3); border-radius: 7px; padding: 10px 12px; margin-bottom:8px; }
  .attack-row .row{ margin-bottom: 6px; }
  .attack-row .avg{ font-family: var(--font-mono); color: var(--gold-bright); font-weight:700; }

  .die-face{
    display:inline-flex; align-items:center; justify-content:center;
    width: 46px; height:46px; border-radius: 9px;
    background: var(--panel-3); border: 1px solid var(--line);
    font-family: var(--font-mono); font-weight:700; font-size: 18px;
    transition: transform .35s cubic-bezier(.36,1.5,.5,1);
  }
  .die-face.rolling{ transform: rotate(360deg) scale(1.08); }
  .dice-tray{ display:flex; gap:8px; flex-wrap:wrap; margin: 12px 0; }

  .hist-bar-row{ display:flex; align-items:center; gap:8px; margin-bottom:3px; }
  .hist-label{ width:38px; font-family: var(--font-mono); font-size:11px; color: var(--ink-faint); text-align:left; }
  .hist-track{ flex:1; background: var(--panel); border-radius:4px; overflow:hidden; height:14px; }
  .hist-fill{ height:100%; background: linear-gradient(90deg, var(--utility), var(--gold)); }
  .hist-count{ width:34px; font-family: var(--font-mono); font-size:10.5px; color: var(--ink-faint); }

  .resource-bar-big{ height: 20px; border-radius: 6px; background: var(--panel); overflow:hidden; border:1px solid var(--line); }
  .resource-bar-big-fill{ height:100%; transition: width .25s; }

  .loot-item{ display:flex; align-items:center; gap:10px; background: var(--panel-3); border-radius:7px; padding:8px 12px; margin-bottom:6px; }
  .member-card{ background: var(--panel-3); border-radius:8px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
  .member-card .gold-num{ font-family: var(--font-mono); font-size: 18px; color: var(--gold-bright); font-weight:700; min-width: 90px; text-align:center; }

  .icon-btn{
    background:none; border:none; color: var(--ink-faint); cursor:pointer; font-size:16px; padding:4px 6px;
    border-radius:5px;
  }
  .icon-btn:hover{ color: var(--combat); background: var(--combat-bg); }

  .footnote{ font-size:12px; color: var(--ink-faint); margin-top:10px; }

  /* ---------- encyclopedia ---------- */
  .ency-item{
    display:flex; align-items:center; gap:12px;
    background: var(--panel-3); border:1px solid var(--line-soft);
    border-radius:7px; padding:10px 13px; margin-bottom:8px; cursor:pointer;
    transition: border-color .12s, background .12s;
  }
  .ency-item:hover{ border-color: var(--gold-dim); background:#2a3247; }
  .ency-item .e-name{ font-weight:700; color: var(--ink); flex:1; }
  .ency-item .e-meta{ font-size:12px; color: var(--ink-dim); font-family: var(--font-mono); }
  .ency-loader{ text-align:center; color: var(--utility); padding:26px 0; font-size:14px; }
  .ency-spinner{
    display:inline-block; width:22px; height:22px; margin-inline-end:10px; vertical-align:middle;
    border:3px solid var(--line); border-top-color: var(--gold); border-radius:50%;
    animation: ency-spin .8s linear infinite;
  }
  @keyframes ency-spin{ to{ transform: rotate(360deg); } }

  .ency-overlay{
    position: fixed; inset:0; background: rgba(7,9,14,.72);
    display:flex; align-items:flex-start; justify-content:center;
    padding: 34px 16px; z-index: 100; overflow-y:auto;
    animation: fade .15s ease;
  }
  .ency-modal{
    background: var(--panel); border:1px solid var(--line);
    border-radius: 14px; max-width: 720px; width:100%;
    padding: 22px 24px 26px; box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .ency-modal-head{ display:flex; align-items:flex-start; gap:12px; margin-bottom:6px; }
  .ency-modal-head h3{
    font-family: var(--font-display); font-size:23px; color: var(--gold-bright);
    margin:0; flex:1; font-weight:700;
  }
  .ency-modal-close{
    background: var(--panel-3); border:1px solid var(--line); color: var(--ink-dim);
    width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:16px; flex-shrink:0;
  }
  .ency-modal-close:hover{ color: var(--combat); border-color: var(--combat-line); }
  .ency-sub{ color: var(--ink-dim); font-size:13px; margin:0 0 14px; font-family: var(--font-mono); }
  .ency-desc{ white-space: pre-wrap; font-size:14px; line-height:1.65; color: var(--ink); margin:8px 0; }
  .ency-block{ background: var(--panel-2); border-radius:7px; padding:9px 12px; margin-bottom:7px; font-size:13.5px; line-height:1.6; }
  .ency-section-title{ color: var(--gold); font-weight:700; font-size:13px; margin:16px 0 7px; font-family: var(--font-mono); letter-spacing:.5px; }
  .ency-stats{ display:flex; gap:8px; flex-wrap:wrap; margin:10px 0; }
  .ency-stat{ background: var(--panel-3); border:1px solid var(--line); border-radius:7px; padding:6px 12px; text-align:center; min-width:58px; }
  .ency-stat .s-lbl{ font-size:10.5px; color: var(--ink-faint); font-family: var(--font-mono); }
  .ency-stat .s-val{ font-size:16px; font-weight:700; color: var(--ink); }
  .ency-kv{ display:flex; gap:8px; font-size:13.5px; margin-bottom:4px; }
  .ency-kv .k{ color: var(--ink-dim); min-width:120px; }
  .ency-kv .v{ color: var(--ink); flex:1; }

  .toast{
    position: fixed; bottom: 26px; left:50%; transform: translateX(-50%) translateY(20px);
    background: var(--nature-bg); border:1px solid var(--nature-line); color:#bfe6c9;
    padding: 11px 20px; border-radius:9px; font-weight:600; font-size:14px;
    box-shadow: 0 8px 26px rgba(0,0,0,.4); opacity:0; pointer-events:none;
    transition: opacity .2s, transform .2s; z-index:200;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  @media(max-width: 640px){
    .row{ flex-direction: column; }
    .row > div{ width:100%; }
    header.top{ padding: 20px 14px 0; }
    main{ padding: 20px 14px 30px; border-radius:0; }
    h1.brand{ font-size:24px; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="top-title-row">
      <h1 class="brand">ארגז הכלים של ההרפתקן</h1>
      <span class="brand-sub">D&amp;D 5E · TOOLKIT</span>
    </div>
    <p class="top-desc">שישה כלים לניהול קרב, לחשים, משאבים ושלל — הכול במקום אחד.</p>
    <nav class="tabs" id="tabNav"></nav>
  </div>
</header>

<main id="mainPane"></main>

<script>
/* =========================================================
   כלי ניהול D&D — מצב גלובלי
   ========================================================= */
const state = {
  activeTab: 'setup',

  spells: [
    {id: uid(), name:'ירית קסם', level:0, note:'1ד10 נזק פורס, טווח 36 מ׳', tags:['התקפה']},
    {id: uid(), name:'ריפוי פצעים', level:1, note:'1ד8+מאפיין ריפוי במגע', tags:['ריפוי']},
    {id: uid(), name:'ערפל שולט', level:1, note:'עשן ענק מסתיר שדה', tags:['שליטה']},
  ],
  slots: {1:{max:4,used:0},2:{max:3,used:0},3:{max:2,used:0},4:{max:1,used:0},5:{max:0,used:0},6:{max:0,used:0},7:{max:0,used:0},8:{max:0,used:0},9:{max:0,used:0}},
  spellTagFilter: '',
  recommendTag: '',

  specials: [
    {id: uid(), name:'התקפה נוספת', max:1, used:0, reset:'long'},
    {id: uid(), name:'זעם', max:2, used:0, reset:'long'},
  ],
  combo: [
    {id: uid(), name:'התקפה 1', dice:1, die:8, mod:3, bonusDice:0, bonusDie:6, bonusOn:false, crit:false},
  ],

  diceHistory: [],

  resources: {
    hpMax: 45, hpCur: 45, hpTemp: 0,
    hdType: 10,
    conMod: 2,
  },

  character: {
    name: '',
    className: '',
    race: '',
    level: 1,
  },

  gold: 0,
  silver: 0,
  copper: 0,
  inventory: [],

  // אנציקלופדיה — נטען בזמן אמת מ-Open5e, לא נשמר ל-localStorage (רק הקטגוריה)
  ency: {
    category: 'spells',
    query: '',
    results: [],
    next: null,
    loading: false,
    error: null,
    fetched: false,
    detail: null,
  },
};

function uid(){ return Math.random().toString(36).slice(2,10); }
function rollDie(sides){ return 1 + Math.floor(Math.random()*sides); }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function goToTab(id){ state.activeTab = id; renderTabs(); renderMain(); }

// מנוחה קצרה/ארוכה גלובלית — כפתור בכל טאב מפעיל את אותה פעולה על כל הדמות בבת אחת
function doShortRest(){
  state.specials.forEach(s=>{ if(s.reset==='short') s.used=0; });
  renderMain();
}
function doLongRest(){
  const r = state.resources;
  Object.values(state.slots).forEach(s=> s.used = 0);
  state.specials.forEach(s=> s.used=0);
  state.spells.forEach(s=>{ if(s.usesPerDay) s.usesUsed = 0; });
  r.hpCur = r.hpMax; r.hpTemp = 0;
  renderMain();
}

/* =========================================================
   Open5e API — מקצועות וגזעים אמיתיים (SRD), לא מוקלד ידנית
   ========================================================= */
const open5e = {
  classes: [],
  races: [],
  status: 'loading', // 'loading' | 'ready' | 'error'
};

function hitDiceToNumber(hd){
  const m = /d(\d+)/i.exec(hd||'');
  return m ? parseInt(m[1],10) : 8;
}

// בונוס מיומנות רשמי לפי טבלת ה-5E (רמה 1-4: +2, 5-8: +3, 9-12: +4, 13-16: +5, 17-20: +6)
function proficiencyBonusForLevel(level){
  return 2 + Math.floor((clamp(level,1,20) - 1) / 4);
}

// טבלת חריצי הקסם הרשמית של Full Caster (קוסם, כומר, דרואיד וכו') לפי רמת דמות
const FULL_CASTER_SLOT_TABLE = {
  1:[2,0,0,0,0,0,0,0,0],   2:[3,0,0,0,0,0,0,0,0],   3:[4,2,0,0,0,0,0,0,0],
  4:[4,3,0,0,0,0,0,0,0],   5:[4,3,2,0,0,0,0,0,0],   6:[4,3,3,0,0,0,0,0,0],
  7:[4,3,3,1,0,0,0,0,0],   8:[4,3,3,2,0,0,0,0,0],   9:[4,3,3,3,1,0,0,0,0],
  10:[4,3,3,3,2,0,0,0,0],  11:[4,3,3,3,2,1,0,0,0],  12:[4,3,3,3,2,1,0,0,0],
  13:[4,3,3,3,2,1,1,0,0],  14:[4,3,3,3,2,1,1,0,0],  15:[4,3,3,3,2,1,1,1,0],
  16:[4,3,3,3,2,1,1,1,0],  17:[4,3,3,3,2,1,1,1,1],  18:[4,3,3,3,3,1,1,1,1],
  19:[4,3,3,3,3,2,1,1,1],  20:[4,3,3,3,3,2,2,1,1],
};

// אומדן חיים מקסימליים: קובייה מלאה ברמה 1, ממוצע הקובייה (מעוגל למעלה) לכל רמה נוספת, ועוד בונוס קונ' לכל רמה
function estimateMaxHp(selectedClass, hdType, level, conMod){
  const die = selectedClass ? hitDiceToNumber(selectedClass.hit_dice) : hdType;
  const lvl = clamp(level||1, 1, 20);
  const avgPerLevel = Math.ceil((die+1)/2);
  return die + conMod + (lvl-1)*(avgPerLevel + conMod);
}

// מעדכן אוטומטית ערכים שנגזרים מרמת הדמות: חריצי קסם ובונוס מיומנות
function applyLevelDerivedStats(){
  const c = state.character;
  const level = clamp(c.level||1, 1, 20);

  if(currentClassIsCaster()){
    const row = FULL_CASTER_SLOT_TABLE[level] || FULL_CASTER_SLOT_TABLE[20];
    row.forEach((max, i)=>{
      const lvl = i+1;
      state.slots[lvl].max = max;
      state.slots[lvl].used = Math.min(state.slots[lvl].used, max);
    });
  }
}

async function loadOpen5eData(){
  try{
    const [classesRes, racesRes] = await Promise.all([
      fetch('https://api.open5e.com/v1/classes/?fields=name,slug,hit_dice,prof_saving_throws,spellcasting_ability&limit=50'),
      fetch('https://api.open5e.com/v1/races/?fields=name,slug,asi_desc,speed,size,vision,traits,document__slug&limit=100'),
    ]);
    if(!classesRes.ok || !racesRes.ok) throw new Error('open5e http error');
    const classesData = await classesRes.json();
    const racesData = await racesRes.json();

    open5e.classes = (classesData.results || [])
      .map(c => ({name:c.name, slug:c.slug, hit_dice:c.hit_dice, prof_saving_throws:c.prof_saving_throws, spellcasting_ability:c.spellcasting_ability||''}))
      .sort((a,b)=>a.name.localeCompare(b.name));

    // רק גזעי ה-SRD הרשמיים (מדריך השחקן הבסיסי), לא תוכן צד-שלישי
    open5e.races = (racesData.results || [])
      .filter(r => r.document__slug === 'wotc-srd')
      .map(r => ({name:r.name, slug:r.slug, asi_desc:r.asi_desc, speed:r.speed, size:r.size, vision:r.vision, traits:r.traits}))
      .sort((a,b)=>a.name.localeCompare(b.name));

    if(!open5e.classes.length) open5e.classes = OPEN5E_FALLBACK_CLASSES;
    if(!open5e.races.length) open5e.races = OPEN5E_FALLBACK_RACES;

    open5e.status = 'ready';
  }catch(err){
    console.warn('Open5e API fetch failed, using fallback list:', err);
    open5e.classes = OPEN5E_FALLBACK_CLASSES;
    open5e.races = OPEN5E_FALLBACK_RACES;
    open5e.status = 'error';
  }

  if(!state.character.className && open5e.classes.length){
    state.character.className = (open5e.classes.find(c=>c.slug==='wizard') || open5e.classes[0]).name;
  }
  if(!state.character.race && open5e.races.length){
    state.character.race = (open5e.races.find(r=>r.slug==='human') || open5e.races[0]).name;
  }

  applyLevelDerivedStats();
  renderTabs();
  if(!visibleTabs().find(t=>t.id===state.activeTab)) state.activeTab = 'setup';
  renderTabs();
  renderMain();
}

// האם המחלקה הנוכחית מטילה קסמים, לפי הנתון spellcasting_ability שמגיע מ-Open5e (לא ניחוש)
function currentClassIsCaster(){
  const cl = open5e.classes.find(c => c.name === state.character.className);
  if(!cl) return true; // כל עוד לא נבחרה מחלקה, לא מסתירים כלום
  return !!cl.spellcasting_ability;
}

function renderTabs(){

const STORAGE_KEY = 'dnd-helper-state';
function saveState(){
  try{
    // תוצאות האנציקלופדיה נטענות מהרשת ואינן נשמרות — רק הקטגוריה שנבחרה
    const {ency, ...rest} = state;
    const persist = {...rest, ency: {category: ency ? ency.category : 'spells'}};
    localStorage.setItem(STORAGE_KEY, JSON.stringify(persist));
  }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    const savedEncyCat = saved.ency && saved.ency.category;
    Object.assign(state, saved);
    // איפוס שדות האנציקלופדיה הזמניים (נטענים מחדש מ-Open5e בכל כניסה)
    state.ency = {category: savedEncyCat || 'spells', query:'', results:[], next:null, loading:false, error:null, fetched:false, detail:null};
    // מיגרציה: לחשים ישנים השתמשו ב-category ובתג יחיד (tag) — כעת יש רק מערך tags
    state.spells.forEach(s=>{
      if(!Array.isArray(s.tags)) s.tags = s.tag ? [s.tag] : [];
      delete s.tag; delete s.category;
    });
  }catch(e){}
}

   ========================================================= */
let spellTagsEditingId = null; // מזהה הלחש שבו נערך כרגע שדה התגיות (אחד בכל פעם)
function parseTagsInput(raw){
  return String(raw||'').split(',').map(t=>t.trim()).filter(Boolean);
}
function allSpellTags(){
  return [...new Set(state.spells.flatMap(s=>s.tags||[]))].sort((a,b)=>a.localeCompare(b,'he'));
}
function recommendCheapest(tag){
  const candidates = state.spells.filter(s => (s.tags||[]).includes(tag)).sort((a,b)=>a.level-b.level);
  for(const sp of candidates){
    if(sp.usesPerDay){
      if((sp.usesUsed||0) < sp.usesPerDay) return {spell: sp, reason:`הטלות ליום (נותרו ${sp.usesPerDay-(sp.usesUsed||0)}/${sp.usesPerDay})`};
      continue;
    }
    if(sp.level === 0) return {spell: sp, reason:'קסם פשוט — ללא עלות בחריצים'};
    const slot = state.slots[sp.level];
    if(slot && slot.used < slot.max) return {spell: sp, reason:`דורש חריץ רמה ${sp.level} (נותרו ${slot.max - slot.used})`};
  }
  const cantrip = candidates.find(s=>s.level===0 && !s.usesPerDay);
  if(cantrip) return {spell: cantrip, reason:'קסם פשוט — ללא עלות בחריצים'};
  return null;
}

function renderSpellsTab(){

  const tagOptions = allSpellTags();
  if(!tagOptions.includes(state.recommendTag)) state.recommendTag = tagOptions[0] || '';
  const rec = state.recommendTag ? recommendCheapest(state.recommendTag) : null;

/* =========================================================
   2. לוחם — FIGHTER
   ========================================================= */
function attackAverage(a){
  const dieAvg = (a.die+1)/2;
  let base = a.dice*dieAvg + Number(a.mod||0);
  if(a.crit) base = a.dice*2*dieAvg + Number(a.mod||0);
  let bonus = 0;
  if(a.bonusOn && a.bonusDice>0){
    const bDieAvg = (a.bonusDie+1)/2;
    bonus = a.crit ? a.bonusDice*2*bDieAvg : a.bonusDice*bDieAvg;
  }
  return base + bonus;
}
function attackRoll(a){
  let total = 0;
  const rounds = a.crit ? 2 : 1;
  for(let r=0;r<rounds;r++) for(let i=0;i<a.dice;i++) total += rollDie(a.die);
  total += Number(a.mod||0);
  if(a.bonusOn && a.bonusDice>0){
    const brounds = a.crit ? 2 : 1;
    for(let r=0;r<brounds;r++) for(let i=0;i<a.bonusDice;i++) total += rollDie(a.bonusDie);
  }
  return total;
}

function readDiceInputs(){
  return {
    count: parseInt(document.getElementById('dxCount').value,10)||1,
    side: parseInt(document.getElementById('dxSide').value,10),
    mod: parseInt(document.getElementById('dxMod').value,10)||0,
    mode: document.getElementById('dxMode').value,
  };
}

function rollExpression(count, side){
  let vals=[]; for(let i=0;i<count;i++) vals.push(rollDie(side));
  return vals;
}

function doDiceRoll(){
  const {count, side, mod, mode} = readDiceInputs();
  let vals, total, altVals=null, altTotal=null, chosen;
  vals = rollExpression(count, side); total = vals.reduce((a,b)=>a+b,0) + mod;
  if(mode !== 'normal'){
    altVals = rollExpression(count, side); altTotal = altVals.reduce((a,b)=>a+b,0) + mod;
    if(mode==='adv') chosen = total >= altTotal ? {vals,total} : {vals:altVals,total:altTotal};
    else chosen = total <= altTotal ? {vals,total} : {vals:altVals,total:altTotal};
  } else {
    chosen = {vals, total};
  }

  const tray = document.getElementById('diceTray');
  tray.innerHTML = chosen.vals.map(v=>`<div class="die-face rolling">${v}</div>`).join('') +
    (mod ? `<div class="die-face" style="border-color:var(--gold-dim);color:var(--gold-bright);">${mod>0?'+':''}${mod}</div>` : '');

  let extra = '';
  if(mode !== 'normal'){
    extra = `<div class="footnote">הטלה חלופית (${mode==='adv'?'לא נבחרה כי נמוכה יותר':'לא נבחרה כי גבוהה יותר'}): ${altVals.join(', ')} ${mod?`(+${mod})`:''} = ${altTotal}</div>`;
  }

  document.getElementById('dxResultBox').innerHTML = `
    <div class="result-box">
      <div class="stat"><div class="num">${chosen.total}</div><div class="lbl">תוצאה סופית</div></div>
      <div class="stat"><div class="num" style="font-size:15px; color:var(--ink-dim);">${chosen.vals.join(' + ')}${mod?` + ${mod}`:''}</div><div class="lbl">פירוט</div></div>
    </div>
    ${extra}
  `;

  state.diceHistory.unshift({count,side,mod,mode,total:chosen.total});
  state.diceHistory = state.diceHistory.slice(0,10);
  saveState();
}

function doSimulate(){
  const {count, side, mod, mode} = readDiceInputs();
  const trials = 20000;
  let sum = 0; const freq = {};
  for(let t=0;t<trials;t++){
    let total = rollExpression(count,side).reduce((a,b)=>a+b,0) + mod;
    if(mode !== 'normal'){
      const alt = rollExpression(count,side).reduce((a,b)=>a+b,0) + mod;
      total = mode==='adv' ? Math.max(total,alt) : Math.min(total,alt);
    }
    sum += total;
    freq[total] = (freq[total]||0)+1;
  }
  const simAvg = sum/trials;
  const theoAvg = count*(side+1)/2 + mod;

  const totals = Object.keys(freq).map(Number).sort((a,b)=>a-b);
  const maxFreq = Math.max(...Object.values(freq));
  const step = Math.max(1, Math.ceil(totals.length/22));
  let histHtml = '';
  for(let i=0;i<totals.length;i+=step){
    const v = totals[i];
    const c = freq[v];
    histHtml += `<div class="hist-bar-row">
      <div class="hist-label">${v}</div>
      <div class="hist-track"><div class="hist-fill" style="width:${(c/maxFreq*100).toFixed(1)}%"></div></div>
      <div class="hist-count">${(c/trials*100).toFixed(1)}%</div>
    </div>`;
  }

  document.getElementById('dxSimResult').innerHTML = `
    <div class="result-box">
      <div class="stat"><div class="num">${theoAvg.toFixed(2)}</div><div class="lbl">ממוצע תאורטי (מצב רגיל)</div></div>
      <div class="stat"><div class="num">${simAvg.toFixed(2)}</div><div class="lbl">ממוצע מדומה (${mode==='normal'?'רגיל':mode==='adv'?'יתרון':'חיסרון'}, ${trials.toLocaleString()} הטלות)</div></div>
    </div>
    <div style="margin-top:12px;">${histHtml}</div>
    <div class="footnote">ההפרש בין הממוצע התאורטי לממוצע במצב יתרון/חיסרון נובע מבחירת הטובה/הגרועה מבין שתי הטלות מלאות.</div>
  `;
}

  {key:'spells',      endpoint:'spells',      label:'לחשים'},
  {key:'monsters',    endpoint:'monsters',    label:'מפלצות'},
  {key:'magicitems',  endpoint:'magicitems',  label:'פריטים קסומים'},
  {key:'weapons',     endpoint:'weapons',     label:'נשקים'},
  {key:'armor',       endpoint:'armor',       label:'שריון'},
  {key:'races',       endpoint:'races',       label:'גזעים'},
  {key:'classes',     endpoint:'classes',     label:'מקצועות'},
  {key:'feats',       endpoint:'feats',       label:'כשרונות'},
  {key:'conditions',  endpoint:'conditions',  label:'מצבים'},
  {key:'backgrounds', endpoint:'backgrounds', label:'רקעים'},
  {key:'planes',      endpoint:'planes',      label:'מישורים'},
  {key:'sections',    endpoint:'sections',    label:'כללים'},
  {key:'spelllist',   endpoint:'spelllist',   label:'רשימות לחשים'},
  {key:'documents',   endpoint:'documents',   label:'מקורות'},
];
const ENCY_ADDABLE = {spells:true, weapons:true, magicitems:true};

function encyName(item){ return item.name || item.title || item.slug || '—'; }

function toast(msg){
  let el = document.getElementById('toast');
  if(!el){ el = document.createElement('div'); el.id='toast'; el.className='toast'; document.body.appendChild(el); }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=> el.classList.remove('show'), 2200);
}

function fmtDesc(text){
  if(!text) return '';
  let h = esc(String(text)).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  return `<div class="ency-desc">${h}</div>`;
}
function abilityBlocks(arr){
  if(!Array.isArray(arr) || !arr.length) return '';
  return arr.map(a=>`<div class="ency-block"><strong>${esc(a.name||'')}.</strong> ${esc(a.desc||a.description||'')}</div>`).join('');
}
function fmtSpeed(sp){
  if(!sp) return '';
  if(typeof sp === 'string') return sp;
  return Object.entries(sp).map(([k,v])=> typeof v==='boolean' ? k : `${k} ${v}`).join(', ');
}
function parseCost(cost){
  if(!cost) return 0;
  const m = /([\d,.]+)\s*(gp|sp|cp)?/i.exec(String(cost));
  if(!m) return 0;
  let v = parseFloat(m[1].replace(/,/g,'')) || 0;
  const unit = (m[2]||'gp').toLowerCase();
  if(unit==='sp') v/=10; if(unit==='cp') v/=100;
  return Math.round(v*100)/100;
}

/* ----- שליפה מ-Open5e ----- */
async function encyFetch(reset){
  const cat = ENCY_CATEGORIES.find(c => c.key === state.ency.category);
  if(!cat) return;
  state.ency.loading = true;
  state.ency.error = null;
  if(reset){ state.ency.results = []; state.ency.next = null; }
  renderEncyclopediaTab();
  try{
    let url = (!reset && state.ency.next) ? state.ency.next : null;
    if(!url){
      const q = state.ency.query.trim();
      url = `https://api.open5e.com/v1/${cat.endpoint}/?limit=30${q?`&search=${encodeURIComponent(q)}`:''}`;
    }
    const res = await fetch(url);
    if(!res.ok) throw new Error('http '+res.status);
    const data = await res.json();
    state.ency.results = state.ency.results.concat(data.results || []);
    state.ency.next = data.next || null;
  }catch(err){
    console.warn('Open5e encyclopedia fetch failed:', err);
    state.ency.error = 'שגיאה בטעינה מ-Open5e. בדקו את החיבור לרשת ונסו שוב.';
  }finally{
    state.ency.loading = false;
    state.ency.fetched = true;
    renderEncyclopediaTab();
  }
}

/* ----- תקציר לשורת רשימה ----- */
function encyItemMeta(cat, it){
  switch(cat){
    case 'spells':      return [it.level, it.school].filter(Boolean).join(' · ');
    case 'monsters':    return [[it.size, it.type].filter(Boolean).join(' '), it.challenge_rating!=null?`CR ${it.challenge_rating}`:''].filter(Boolean).join(' · ');
    case 'magicitems':  return [it.type, it.rarity].filter(Boolean).join(' · ');
    case 'weapons':     return [it.damage_dice, it.damage_type].filter(Boolean).join(' ');
    case 'armor':       return [it.category, it.ac_string].filter(Boolean).join(' · ');
    case 'races':       return [it.size, fmtSpeed(it.speed)].filter(Boolean).join(' · ');
    case 'classes':     return it.hit_dice ? `קובית חיים ${it.hit_dice}` : '';
    case 'feats':       return it.prerequisite || '';
    case 'backgrounds': return it.skill_proficiencies || '';
    case 'sections':    return it.parent || '';
    case 'documents':   return [it.organization, it.author].filter(Boolean).join(' · ');
    case 'spelllist':   return Array.isArray(it.spells) ? `${it.spells.length} לחשים` : '';
    default:            return '';
  }
}

/* ----- תצוגת פירוט מלאה לפי סוג ----- */
function encyDetailBody(cat, it){
  const S = (t)=>`<div class="ency-section-title">${t}</div>`;
  const kv = (k,v)=> v!=null && v!=='' ? `<div class="ency-kv"><span class="k">${k}</span><span class="v">${esc(String(v))}</span></div>` : '';

  switch(cat){
    case 'spells':{
      const meta = [it.level, it.school, it.casting_time, it.range, it.duration, it.components,
        it.concentration==='yes'||it.concentration===true?'ריכוז':'', it.ritual==='yes'||it.ritual===true?'טקס':'', it.dnd_class]
        .filter(Boolean).join(' · ');
      return `<p class="ency-sub">${esc(meta)}</p>${fmtDesc(it.desc)}${it.higher_level?S('ברמה גבוהה יותר')+fmtDesc(it.higher_level):''}`;
    }
    case 'monsters':{
      const abil = [['str','כוח','strength'],['dex','זריזות','dexterity'],['con','חוסן','constitution'],
        ['int','תבונה','intelligence'],['wis','חוכמה','wisdom'],['cha','כריזמה','charisma']];
      const stats = abil.map(([,lbl,f])=>`<div class="ency-stat"><div class="s-val">${it[f]!=null?it[f]:'—'}</div><div class="s-lbl">${lbl}</div></div>`).join('');
      const saves = abil.map(([,lbl,f])=> it[f+'_save']!=null ? `${lbl} +${it[f+'_save']}` : null).filter(Boolean).join(', ');
      const skills = (it.skills && typeof it.skills==='object')
        ? Object.entries(it.skills).map(([k,v])=>`${k} ${v>=0?'+':''}${v}`).join(', ')
        : (it.skills || '');
      return `<p class="ency-sub">${esc([it.size, it.type, it.alignment].filter(Boolean).join(' · '))}</p>
        ${kv('דרגת מסוכנות (CR)', it.challenge_rating)}
        ${kv('שריון (AC)', [it.armor_class, it.armor_desc].filter(Boolean).join(' '))}
        ${kv('נקודות חיים', [it.hit_points, it.hit_dice?`(${it.hit_dice})`:''].filter(Boolean).join(' '))}
        ${kv('מהירות', fmtSpeed(it.speed))}
        <div class="ency-stats">${stats}</div>
        ${kv('הצלות', saves)}
        ${kv('מיומנויות', skills)}
        ${kv('חסינויות נזק', it.damage_immunities || '')}
        ${kv('התנגדויות נזק', it.damage_resistances || '')}
        ${kv('פגיעות נזק', it.damage_vulnerabilities || '')}
        ${kv('חסינויות מצב', it.condition_immunities || '')}
        ${kv('חושים', it.senses || '')}
        ${kv('שפות', it.languages || '')}
        ${it.special_abilities&&it.special_abilities.length?S('יכולות מיוחדות')+abilityBlocks(it.special_abilities):''}
        ${it.actions&&it.actions.length?S('פעולות')+abilityBlocks(it.actions):''}
        ${it.reactions&&it.reactions.length?S('תגובות')+abilityBlocks(it.reactions):''}
        ${it.legendary_actions&&it.legendary_actions.length?S('פעולות אגדיות')+abilityBlocks(it.legendary_actions):''}`;
    }
    case 'weapons':
      return `${kv('קטגוריה', it.category)}${kv('נזק', [it.damage_dice, it.damage_type].filter(Boolean).join(' '))}
        ${kv('תכונות', Array.isArray(it.properties)?it.properties.join(', '):it.properties)}
        ${kv('מחיר', it.cost)}${kv('משקל', it.weight)}`;
    case 'armor':
      return `${kv('קטגוריה', it.category)}${kv('דירוג שריון (AC)', it.ac_string)}
        ${kv('דרישת כוח', it.strength_requirement)}${kv('חיסרון בהתגנבות', it.stealth_disadvantage?'כן':'לא')}
        ${kv('מחיר', it.cost)}${kv('משקל', it.weight)}`;
    case 'magicitems':
      return `<p class="ency-sub">${esc([it.type, it.rarity, (it.requires_attunement && it.requires_attunement!=='')?'דורש כוונון':''].filter(Boolean).join(' · '))}</p>${fmtDesc(it.desc)}`;
    case 'races':
      return `${kv('העלאת מאפיינים', it.asi_desc?String(it.asi_desc).replace(/\*/g,''):'')}
        ${kv('גודל', it.size||it.size_raw)}${kv('מהירות', fmtSpeed(it.speed))}${kv('ראייה', it.vision)}
        ${kv('גיל', it.age)}${kv('נטייה', it.alignment)}${kv('שפות', it.languages)}
        ${it.traits?S('תכונות גזע')+fmtDesc(it.traits):''}`;
    case 'classes':
      return `${kv('קובית חיים', it.hit_dice)}${kv('הצלות מיומנות', it.prof_saving_throws)}
        ${kv('שריון', it.prof_armor)}${kv('נשקים', it.prof_weapons)}${kv('כלים', it.prof_tools)}
        ${kv('מיומנויות', it.prof_skills)}${kv('יכולת הטלת קסמים', it.spellcasting_ability)}
        ${it.desc?S('תיאור')+fmtDesc(it.desc):''}`;
    case 'feats':
      return `${kv('דרישת קדם', it.prerequisite)}${fmtDesc(it.desc)}`;
    case 'backgrounds':
      return `${kv('מיומנויות', it.skill_proficiencies)}${kv('כלים', it.tool_proficiencies)}${kv('שפות', it.languages)}
        ${kv('ציוד', it.equipment)}${fmtDesc(it.desc)}
        ${it.feature?S(it.feature)+fmtDesc(it.feature_desc):''}`;
    case 'conditions':
    case 'planes':
    case 'sections':
      return fmtDesc(it.desc);
    case 'spelllist':
      return `${fmtDesc(it.desc)}${Array.isArray(it.spells)?S(`לחשים (${it.spells.length})`)+`<div class="ency-desc">${esc(it.spells.map(s=>String(s).replace(/-/g,' ')).join(', '))}</div>`:''}`;
    case 'documents':
      return `${kv('מחבר', it.author)}${kv('ארגון', it.organization)}${kv('רישיון', it.license)}${fmtDesc(it.desc)}`;
    default:
      return fmtDesc(it.desc);
  }
}

function encyDetailModal(){
  const it = state.ency.detail;
  if(!it) return '';
  const cat = state.ency.category;
  let addBtn = '';
  if(cat==='spells')     addBtn = `<button class="btn gold" id="encyAdd" style="margin-top:16px;">＋ הוסף לספר הלחשים שלי</button>`;
  if(cat==='weapons')    addBtn = `<button class="btn gold" id="encyAdd" style="margin-top:16px;">＋ הוסף לתרמיל השלל</button>`;
  if(cat==='magicitems') addBtn = `<button class="btn gold" id="encyAdd" style="margin-top:16px;">＋ הוסף לתרמיל השלל</button>`;
  return `
    <div class="ency-overlay" id="encyOverlay">
      <div class="ency-modal">
        <div class="ency-modal-head">
          <h3>${esc(encyName(it))}</h3>
          <button class="ency-modal-close" id="encyClose" aria-label="סגור">✕</button>
        </div>
        ${encyDetailBody(cat, it)}
        ${addBtn}
      </div>
    </div>`;
}

function renderEncyclopediaTab(){
  const pane = document.getElementById('pane-ency');
  if(!pane) return;
  const e = state.ency;
  const cat = ENCY_CATEGORIES.find(c => c.key === e.category);

  let listHtml;
  if(e.loading && !e.results.length){
    listHtml = `<div class="ency-loader"><span class="ency-spinner"></span>טוען מ-Open5e...</div>`;
  }else if(e.error){
    listHtml = `<div class="empty-state">${e.error}</div>`;
  }else if(!e.results.length){
    listHtml = `<div class="empty-state">לא נמצאו תוצאות${e.query?` עבור "${esc(e.query)}"`:''}.</div>`;
  }else{
    listHtml = e.results.map((it,idx)=>{
      const meta = encyItemMeta(e.category, it);
      const quick = ENCY_ADDABLE[e.category]
        ? `<button class="btn small gold" data-ency-quickadd="${idx}" title="הוסף">＋</button>` : '';
      return `<div class="ency-item" data-ency-open="${idx}">
        <span class="e-name">${esc(encyName(it))}</span>
        ${meta?`<span class="e-meta">${esc(meta)}</span>`:''}
        ${quick}
      </div>`;
    }).join('');
  }

  pane.innerHTML = `
    <h2 class="pane-title">אנציקלופדיה — D&amp;D 5E</h2>
    <p class="pane-note">עיון חי בכל תוכן ה-SRD דרך <a href="https://open5e.com" target="_blank" rel="noopener" style="color:var(--gold-bright);">Open5e API</a>: מפלצות, לחשים, פריטים, גזעים, מקצועות ועוד. לחצו על פריט לפרטים מלאים. בלחשים, נשקים ופריטים קסומים יש כפתור הוספה ישירות לדמות שלכם.</p>

    <div class="chip-row">
      ${ENCY_CATEGORIES.map(c=>`<div class="chip ${c.key===e.category?'active':''}" data-ency-cat="${c.key}" style="${c.key===e.category?'color:var(--gold-bright);border-color:var(--gold);':''}">${c.label}</div>`).join('')}
    </div>

    <div class="card">
      <div class="row">
        <div style="flex:3"><label class="field-label">חיפוש ב${esc(cat?cat.label:'')}</label><input type="text" id="encySearch" value="${esc(e.query)}" placeholder="הקלידו שם ולחצו חיפוש..."></div>
        <div><button class="btn gold" id="encySearchBtn" style="width:100%;">חיפוש</button></div>
        ${e.query?`<div><button class="btn" id="encyClear" style="width:100%;">נקה</button></div>`:''}
      </div>

      <div id="encyList" style="margin-top:16px;">${listHtml}</div>

      ${e.next ? `<div class="row" style="margin-top:6px;"><button class="btn" id="encyMore" style="flex:1;" ${e.loading?'disabled':''}>${e.loading?'טוען...':'טען עוד תוצאות'}</button></div>` : ''}
    </div>

    ${encyDetailModal()}
  `;

  // טעינה ראשונית אוטומטית של הקטגוריה הנוכחית
  if(!e.fetched && !e.loading){ encyFetch(true); return; }

  // בחירת קטגוריה
  pane.querySelectorAll('[data-ency-cat]').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      if(e.category === chip.dataset.encyCat) return;
      e.category = chip.dataset.encyCat;
      e.query = ''; e.results = []; e.next = null; e.fetched = false; e.detail = null;
      renderEncyclopediaTab();
    });
  });

  // חיפוש
  const searchInput = document.getElementById('encySearch');
  searchInput.addEventListener('input', ev=>{ e.query = ev.target.value; });
  searchInput.addEventListener('keydown', ev=>{ if(ev.key==='Enter') encyFetch(true); });
  document.getElementById('encySearchBtn').addEventListener('click', ()=> encyFetch(true));
  document.getElementById('encyClear')?.addEventListener('click', ()=>{ e.query=''; encyFetch(true); });
  document.getElementById('encyMore')?.addEventListener('click', ()=> encyFetch(false));

  // פתיחת פירוט
  pane.querySelectorAll('[data-ency-open]').forEach(row=>{
    row.addEventListener('click', ev=>{
      if(ev.target.closest('[data-ency-quickadd]')) return; // כפתור ההוספה מטופל בנפרד
      e.detail = e.results[parseInt(row.dataset.encyOpen,10)];
      renderEncyclopediaTab();
    });
  });

  // הוספה מהירה מהרשימה
  pane.querySelectorAll('[data-ency-quickadd]').forEach(btn=>{
    btn.addEventListener('click', ev=>{
      ev.stopPropagation();
      const it = e.results[parseInt(btn.dataset.encyQuickadd,10)];
      if(e.category==='spells') addSpellFromApi(it);
      else if(e.category==='weapons') addWeaponFromApi(it);
      else if(e.category==='magicitems') addMagicItemFromApi(it);
    });
  });

  // מודל הפירוט
  document.getElementById('encyClose')?.addEventListener('click', ()=>{ e.detail=null; renderEncyclopediaTab(); });
  document.getElementById('encyOverlay')?.addEventListener('click', ev=>{
    if(ev.target.id==='encyOverlay'){ e.detail=null; renderEncyclopediaTab(); }
  });
  document.getElementById('encyAdd')?.addEventListener('click', ()=>{
    const it = e.detail;
    if(e.category==='spells') addSpellFromApi(it);
    else if(e.category==='weapons') addWeaponFromApi(it);
    else if(e.category==='magicitems') addMagicItemFromApi(it);
  });

  saveState();
}

/* =========================================================
   INIT
   ========================================================= */
loadState();
applyLevelDerivedStats();
renderTabs();
renderMain();
loadOpen5eData();
</script>
</body>
</html>
