<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ארגז הכלים של ההרפתקן — כלי ניהול D&D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Assistant:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12151f;
    --bg-alt: #0d0f17;
    --panel: #1c2130;
    --panel-2: #242b3f;
    --panel-3: #2c3449;
    --line: #3a4258;
    --line-soft: #2a3146;
    --ink: #ece6d6;
    --ink-dim: #a8a496;
    --ink-faint: #706c60;
    --gold: #d4a24c;
    --gold-bright: #f0c674;
    --gold-dim: #8a6a34;
    --combat: #c1443c;
    --combat-bg: #2c1917;
    --combat-line: #5a2b26;
    --nature: #57946a;
    --nature-bg: #16241c;
    --nature-line: #2c4a37;
    --utility: #5b93bd;
    --utility-bg: #16222c;
    --utility-line: #2c4457;
    --danger: #c1443c;
    --success: #57946a;
    --font-display: 'Frank Ruhl Libre', 'David Libre', serif;
    --font-body: 'Assistant', 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --radius: 10px;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 15% 0%, rgba(212,162,76,0.06), transparent 55%),
      radial-gradient(ellipse at 85% 100%, rgba(87,148,106,0.05), transparent 55%);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  ::selection{ background: var(--gold-dim); color: var(--ink); }

  input, select, textarea, button{ font-family: inherit; }

  /* ---------- header ---------- */
  header.top{
    background: linear-gradient(180deg, var(--bg-alt), var(--bg));
    border-bottom: 1px solid var(--line-soft);
    padding: 28px 24px 0;
  }
  .top-inner{ max-width: 1180px; margin: 0 auto; }
  .top-title-row{
    display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
    margin-bottom: 4px;
  }
  h1.brand{
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 30px;
    margin:0;
    color: var(--gold-bright);
    letter-spacing: 0.5px;
  }
  .brand-sub{
    font-size: 13px;
    color: var(--ink-faint);
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
  }
  .top-desc{
    color: var(--ink-dim);
    font-size: 14px;
    margin: 2px 0 20px;
  }

  /* ---------- tab nav ---------- */
  nav.tabs{
    display:flex; gap:6px; overflow-x:auto;
    padding-bottom: 0;
  }
  nav.tabs::-webkit-scrollbar{ height:0; }
  .tab-btn{
    display:flex; align-items:center; gap:8px;
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    color: var(--ink-faint);
    padding: 11px 18px 12px;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    font-size: 14.5px;
    font-weight: 600;
    white-space: nowrap;
    transition: color .15s, background .15s;
  }
  .tab-btn .dot{
    width:8px; height:8px; border-radius:50%;
    background: currentColor; opacity: .55; flex-shrink:0;
  }
  .tab-btn:hover{ color: var(--ink); }
  .tab-btn.active{
    color: var(--ink);
    background: var(--panel);
    border-color: var(--line-soft);
  }
  .tab-btn.active .dot{ background: var(--gold); opacity:1; }

  /* ---------- main ---------- */
  main{
    max-width: 1180px; margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--line-soft);
    border-radius: 0 0 14px 14px;
    padding: 26px 24px 40px;
    min-height: 60vh;
  }
  section.pane{ display:none; }
  section.pane.active{ display:block; animation: fade .18s ease; }
  @keyframes fade{ from{ opacity:0; transform: translateY(3px);} to{opacity:1; transform:none;} }

  h2.pane-title{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    color: var(--gold-bright);
    margin: 0 0 4px;
  }
  p.pane-note{
    color: var(--ink-dim); font-size: 13.5px; margin: 0 0 22px;
  }

  .grid2{ display:grid; grid-template-columns: 1.15fr 1fr; gap: 20px; }
  .grid3{ display:grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
  @media(max-width: 860px){ .grid2, .grid3{ grid-template-columns: 1fr; } }

  .card{
    background: var(--panel-2);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .card + .card{ margin-top: 14px; }
  .card h3{
    font-family: var(--font-display);
    font-size: 16.5px;
    margin: 0 0 12px;
    color: var(--ink);
    font-weight: 700;
    display:flex; align-items:center; gap:8px;
  }
  .card h3 small{
    font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); font-weight: 400;
  }

  label.field-label{
    display:block; font-size: 12.5px; color: var(--ink-dim); margin-bottom:4px;
  }
  input[type=text], input[type=number], select{
    width:100%;
    background: var(--panel-3);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 7px;
    padding: 8px 10px;
    font-size: 14px;
  }
  input[type=text]:focus, input[type=number]:focus, select:focus{
    outline: none; border-color: var(--gold-dim); box-shadow: 0 0 0 2px rgba(212,162,76,0.15);
  }
  .row{ display:flex; gap:10px; flex-wrap: wrap; align-items:flex-end; }
  .row > div{ flex:1; min-width: 90px; }
  .row.tight > div{ min-width: 70px; }

  button.btn{
    background: var(--panel-3);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 9px 16px;
    border-radius: 7px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .05s;
  }
  button.btn:hover{ background: #333c55; border-color: var(--gold-dim); }
  button.btn:active{ transform: scale(0.97); }
  button.btn.gold{ background: var(--gold-dim); border-color: var(--gold); color: #1a1408; }
  button.btn.gold:hover{ background: var(--gold); }
  button.btn.danger{ border-color: var(--combat-line); color: #f0a29c; }
  button.btn.danger:hover{ background: var(--combat-bg); }
  button.btn.success{ border-color: var(--nature-line); color: #a9d8b6; }
  button.btn.success:hover{ background: var(--nature-bg); }
  button.btn.small{ padding: 5px 10px; font-size: 12px; }
  button.btn.icon-only{ padding: 6px 9px; }
  button.btn:disabled{ opacity:.4; cursor:not-allowed; }

  .chip-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 14px; }
  .chip{
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight:600;
    border: 1px solid var(--line); color: var(--ink-dim); cursor:pointer;
    background: var(--panel-3);
  }
  .chip.active{ color: var(--ink); border-color: currentColor; }
  .chip[data-cat=combat].active{ color: var(--combat); background: var(--combat-bg); border-color: var(--combat-line); }
  .chip[data-cat=environmental].active{ color: var(--nature); background: var(--nature-bg); border-color: var(--nature-line); }
  .chip[data-cat=utility].active{ color: var(--utility); background: var(--utility-bg); border-color: var(--utility-line); }
  .chip[data-cat=all].active{ color: var(--gold-bright); border-color: var(--gold); background: var(--panel-3); }

  .spell-item{
    display:flex; align-items:center; gap:12px;
    padding: 10px 12px; margin-bottom: 8px;
    background: var(--panel-3);
    border-right: 4px solid var(--line);
    border-radius: 6px;
  }
  .spell-item.cat-combat{ border-color: var(--combat); }
  .spell-item.cat-environmental{ border-color: var(--nature); }
  .spell-item.cat-utility{ border-color: var(--utility); }
  .spell-item .name{ font-weight:700; flex:1; }
  .spell-item .lvl{
    font-family: var(--font-mono); font-size: 12px; color: var(--ink-faint);
    background: var(--panel); padding: 2px 8px; border-radius: 5px;
  }
  .spell-item .note{ font-size:12px; color: var(--ink-dim); flex:2; }

  .empty-state{
    color: var(--ink-faint); font-size: 13.5px; text-align:center;
    padding: 22px 10px; border: 1px dashed var(--line); border-radius: 8px;
  }

  .slot-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .slot-row .lvl-label{
    font-family: var(--font-mono); width: 58px; color: var(--ink-dim); font-size:13px;
  }
  .slot-pips{ display:flex; gap:5px; flex:1; flex-wrap:wrap; }
  .pip{
    width:20px; height:20px; border-radius:4px; border:1px solid var(--line);
    background: var(--panel); cursor:pointer; flex-shrink:0;
  }
  .pip.used{ background: var(--gold-dim); border-color: var(--gold); }
  .slot-max-input{ width:52px !important; text-align:center; }

  .recommend-box{
    background: var(--utility-bg); border: 1px solid var(--utility-line);
    border-radius: 8px; padding: 14px 16px; margin-top: 6px;
  }
  .recommend-box .title{ color: var(--utility); font-weight:700; font-size: 13px; margin-bottom:6px; }
  .recommend-box .spell-name{ font-family: var(--font-display); font-size:19px; color: var(--ink); }
  .recommend-box .spell-meta{ font-size: 12.5px; color: var(--ink-dim); margin-top:2px; }

  .result-box{
    background: var(--panel-3); border: 1px solid var(--line);
    border-radius: 8px; padding: 14px 16px; margin-top: 10px;
    display:flex; gap: 24px; flex-wrap:wrap;
  }
  .result-box .stat{ text-align:center; }
  .result-box .stat .num{
    font-family: var(--font-mono); font-size: 26px; font-weight:700; color: var(--gold-bright);
  }
  .result-box .stat .lbl{ font-size: 11.5px; color: var(--ink-dim); margin-top:2px; }

  table.simple{ width:100%; border-collapse: collapse; font-size: 13.5px; }
  table.simple th{ text-align: right; color: var(--ink-faint); font-weight:600; font-size:11.5px; padding: 4px 8px; border-bottom: 1px solid var(--line); }
  table.simple td{ padding: 7px 8px; border-bottom: 1px solid var(--line-soft); }
  table.simple tr:last-child td{ border-bottom:none; }

  .list-item{
    display:flex; align-items:center; gap:10px;
    background: var(--panel-3); border-radius: 7px; padding: 9px 12px; margin-bottom:8px;
  }
  .list-item .grow{ flex:1; }
  .uses-track{ display:flex; gap:4px; }
  .use-pip{ width:16px; height:16px; border-radius:50%; background: var(--panel); border:1px solid var(--line); }
  .use-pip.spent{ background: var(--combat); border-color: var(--combat); }

  .badge{ display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:700; font-family: var(--font-mono); }
  .badge.short{ background: var(--utility-bg); color: var(--utility); border:1px solid var(--utility-line); }
  .badge.long{ background: var(--nature-bg); color: var(--nature); border:1px solid var(--nature-line); }
  .badge.day{ background: var(--panel); color: var(--gold-bright); border:1px solid var(--gold-dim); font-weight:600; }

  .attack-row{ background: var(--panel-3); border-radius: 7px; padding: 10px 12px; margin-bottom:8px; }
  .attack-row .row{ margin-bottom: 6px; }
  .attack-row .avg{ font-family: var(--font-mono); color: var(--gold-bright); font-weight:700; }

  .die-face{
    display:inline-flex; align-items:center; justify-content:center;
    width: 46px; height:46px; border-radius: 9px;
    background: var(--panel-3); border: 1px solid var(--line);
    font-family: var(--font-mono); font-weight:700; font-size: 18px;
    transition: transform .35s cubic-bezier(.36,1.5,.5,1);
  }
  .die-face.rolling{ transform: rotate(360deg) scale(1.08); }
  .dice-tray{ display:flex; gap:8px; flex-wrap:wrap; margin: 12px 0; }

  .hist-bar-row{ display:flex; align-items:center; gap:8px; margin-bottom:3px; }
  .hist-label{ width:38px; font-family: var(--font-mono); font-size:11px; color: var(--ink-faint); text-align:left; }
  .hist-track{ flex:1; background: var(--panel); border-radius:4px; overflow:hidden; height:14px; }
  .hist-fill{ height:100%; background: linear-gradient(90deg, var(--utility), var(--gold)); }
  .hist-count{ width:34px; font-family: var(--font-mono); font-size:10.5px; color: var(--ink-faint); }

  .resource-bar-big{ height: 20px; border-radius: 6px; background: var(--panel); overflow:hidden; border:1px solid var(--line); }
  .resource-bar-big-fill{ height:100%; transition: width .25s; }

  .loot-item{ display:flex; align-items:center; gap:10px; background: var(--panel-3); border-radius:7px; padding:8px 12px; margin-bottom:6px; }
  .member-card{ background: var(--panel-3); border-radius:8px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
  .member-card .gold-num{ font-family: var(--font-mono); font-size: 18px; color: var(--gold-bright); font-weight:700; min-width: 90px; text-align:center; }

  .icon-btn{
    background:none; border:none; color: var(--ink-faint); cursor:pointer; font-size:16px; padding:4px 6px;
    border-radius:5px;
  }
  .icon-btn:hover{ color: var(--combat); background: var(--combat-bg); }

  .footnote{ font-size:12px; color: var(--ink-faint); margin-top:10px; }

  @media(max-width: 640px){
    .row{ flex-direction: column; }
    .row > div{ width:100%; }
    header.top{ padding: 20px 14px 0; }
    main{ padding: 20px 14px 30px; border-radius:0; }
    h1.brand{ font-size:24px; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="top-title-row">
      <h1 class="brand">ארגז הכלים של ההרפתקן</h1>
      <span class="brand-sub">D&amp;D 5E · TOOLKIT</span>
    </div>
    <p class="top-desc">שישה כלים לניהול קרב, לחשים, משאבים ושלל — הכול במקום אחד.</p>
    <nav class="tabs" id="tabNav"></nav>
  </div>
</header>

<main id="mainPane"></main>

<script>
/* =========================================================
   כלי ניהול D&D — מצב גלובלי
   ========================================================= */
const state = {
  activeTab: 'setup',

  spells: [
    {id: uid(), name:'ירית קסם', category:'combat', level:0, note:'1ד10 נזק פורס, טווח 36 מ׳'},
    {id: uid(), name:'ריפוי פצעים', category:'utility', level:1, note:'1ד8+מאפיין ריפוי במגע'},
    {id: uid(), name:'ערפל שולט', category:'environmental', level:1, note:'עשן ענק מסתיר שדה'},
  ],
  slots: {1:{max:4,used:0},2:{max:3,used:0},3:{max:2,used:0},4:{max:1,used:0},5:{max:0,used:0},6:{max:0,used:0},7:{max:0,used:0},8:{max:0,used:0},9:{max:0,used:0}},
  spellFilter: 'all',
  spellTagFilter: '',
  recommendCategory: 'combat',

  specials: [
    {id: uid(), name:'התקפה נוספת', max:1, used:0, reset:'long'},
    {id: uid(), name:'זעם', max:2, used:0, reset:'long'},
  ],
  combo: [
    {id: uid(), name:'התקפה 1', dice:1, die:8, mod:3, bonusDice:0, bonusDie:6, bonusOn:false, crit:false},
  ],

  diceHistory: [],

  resources: {
    hpMax: 45, hpCur: 45, hpTemp: 0,
    hdType: 10,
    conMod: 2,
  },

  character: {
    name: '',
    className: '',
    race: '',
    level: 1,
  },

  gold: 0,
  silver: 0,
  copper: 0,
  inventory: [],
};

function uid(){ return Math.random().toString(36).slice(2,10); }
function rollDie(sides){ return 1 + Math.floor(Math.random()*sides); }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function goToTab(id){ state.activeTab = id; renderTabs(); renderMain(); }

// מנוחה קצרה/ארוכה גלובלית — כפתור בכל טאב מפעיל את אותה פעולה על כל הדמות בבת אחת
function doShortRest(){
  state.specials.forEach(s=>{ if(s.reset==='short') s.used=0; });
  renderMain();
}
function doLongRest(){
  const r = state.resources;
  Object.values(state.slots).forEach(s=> s.used = 0);
  state.specials.forEach(s=> s.used=0);
  state.spells.forEach(s=>{ if(s.usesPerDay) s.usesUsed = 0; });
  r.hpCur = r.hpMax; r.hpTemp = 0;
  renderMain();
}

/* =========================================================
   Open5e API — מקצועות וגזעים אמיתיים (SRD), לא מוקלד ידנית
   ========================================================= */
const open5e = {
  classes: [],
  races: [],
  status: 'loading', // 'loading' | 'ready' | 'error'
};

// גיבוי מינימלי אם אין רשת/ה-API לא זמין — עדיין רשימת המקצועות/הגזעים הרשמיים, לא בדויים
const OPEN5E_FALLBACK_CLASSES = [
  {name:'Barbarian', slug:'barbarian', hit_dice:'1d12', prof_saving_throws:'Strength, Constitution', spellcasting_ability:''},
  {name:'Bard', slug:'bard', hit_dice:'1d8', prof_saving_throws:'Dexterity, Charisma', spellcasting_ability:'Charisma'},
  {name:'Cleric', slug:'cleric', hit_dice:'1d8', prof_saving_throws:'Wisdom, Charisma', spellcasting_ability:'Wisdom'},
  {name:'Druid', slug:'druid', hit_dice:'1d8', prof_saving_throws:'Intelligence, Wisdom', spellcasting_ability:'Wisdom'},
  {name:'Fighter', slug:'fighter', hit_dice:'1d10', prof_saving_throws:'Strength, Constitution', spellcasting_ability:''},
  {name:'Monk', slug:'monk', hit_dice:'1d8', prof_saving_throws:'Strength, Dexterity', spellcasting_ability:''},
  {name:'Paladin', slug:'paladin', hit_dice:'1d10', prof_saving_throws:'Wisdom, Charisma', spellcasting_ability:'Charisma'},
  {name:'Ranger', slug:'ranger', hit_dice:'1d10', prof_saving_throws:'Strength, Dexterity', spellcasting_ability:'Wisdom'},
  {name:'Rogue', slug:'rogue', hit_dice:'1d8', prof_saving_throws:'Dexterity, Intelligence', spellcasting_ability:''},
  {name:'Sorcerer', slug:'sorcerer', hit_dice:'1d6', prof_saving_throws:'Constitution, Charisma', spellcasting_ability:'Charisma'},
  {name:'Warlock', slug:'warlock', hit_dice:'1d8', prof_saving_throws:'Wisdom, Charisma', spellcasting_ability:'Charisma'},
  {name:'Wizard', slug:'wizard', hit_dice:'1d6', prof_saving_throws:'Intelligence, Wisdom', spellcasting_ability:'Intelligence'},
];
const OPEN5E_FALLBACK_RACES = [
  {name:'Dragonborn', slug:'dragonborn', asi_desc:'Strength +2, Charisma +1', speed:{walk:30}},
  {name:'Drow', slug:'drow', asi_desc:'Intelligence +2', speed:{walk:30}},
  {name:'Dwarf', slug:'dwarf', asi_desc:'Constitution +2', speed:{walk:25}},
  {name:'Elf', slug:'elf', asi_desc:'Dexterity +2', speed:{walk:30}},
  {name:'Gnome', slug:'gnome', asi_desc:'Intelligence +2', speed:{walk:25}},
  {name:'Half-Elf', slug:'half-elf', asi_desc:'Charisma +2, ושתי תכונות אחרות +1', speed:{walk:30}},
  {name:'Half-Orc', slug:'half-orc', asi_desc:'Strength +2, Constitution +1', speed:{walk:30}},
  {name:'Halfling', slug:'halfling', asi_desc:'Dexterity +2', speed:{walk:25}},
  {name:'Human', slug:'human', asi_desc:'כל התכונות +1', speed:{walk:30}},
  {name:'Tiefling', slug:'tiefling', asi_desc:'Intelligence +1, Charisma +2', speed:{walk:30}},
];

function hitDiceToNumber(hd){
  const m = /d(\d+)/i.exec(hd||'');
  return m ? parseInt(m[1],10) : 8;
}

// בונוס מיומנות רשמי לפי טבלת ה-5E (רמה 1-4: +2, 5-8: +3, 9-12: +4, 13-16: +5, 17-20: +6)
function proficiencyBonusForLevel(level){
  return 2 + Math.floor((clamp(level,1,20) - 1) / 4);
}

// טבלת חריצי הקסם הרשמית של Full Caster (קוסם, כומר, דרואיד וכו') לפי רמת דמות
const FULL_CASTER_SLOT_TABLE = {
  1:[2,0,0,0,0,0,0,0,0],   2:[3,0,0,0,0,0,0,0,0],   3:[4,2,0,0,0,0,0,0,0],
  4:[4,3,0,0,0,0,0,0,0],   5:[4,3,2,0,0,0,0,0,0],   6:[4,3,3,0,0,0,0,0,0],
  7:[4,3,3,1,0,0,0,0,0],   8:[4,3,3,2,0,0,0,0,0],   9:[4,3,3,3,1,0,0,0,0],

// אומדן חיים מקסימליים: קובייה מלאה ברמה 1, ממוצע הקובייה (מעוגל למעלה) לכל רמה נוספת, ועוד בונוס קונ' לכל רמה
function estimateMaxHp(selectedClass, hdType, level, conMod){
  const die = selectedClass ? hitDiceToNumber(selectedClass.hit_dice) : hdType;
  const lvl = clamp(level||1, 1, 20);
  const avgPerLevel = Math.ceil((die+1)/2);
  return die + conMod + (lvl-1)*(avgPerLevel + conMod);
}

// מעדכן אוטומטית ערכים שנגזרים מרמת הדמות: חריצי קסם ובונוס מיומנות
function applyLevelDerivedStats(){
  const c = state.character;
  const level = clamp(c.level||1, 1, 20);

  if(currentClassIsCaster()){
    const row = FULL_CASTER_SLOT_TABLE[level] || FULL_CASTER_SLOT_TABLE[20];
    row.forEach((max, i)=>{
      const lvl = i+1;
      state.slots[lvl].max = max;
      state.slots[lvl].used = Math.min(state.slots[lvl].used, max);
    });
  }
}

async function loadOpen5eData(){
  try{
    const [classesRes, racesRes] = await Promise.all([
      fetch('https://api.open5e.com/v1/classes/?fields=name,slug,hit_dice,prof_saving_throws,spellcasting_ability&limit=50'),
      fetch('https://api.open5e.com/v1/races/?fields=name,slug,asi_desc,speed,size,vision,traits,document__slug&limit=100'),
    ]);
    if(!classesRes.ok || !racesRes.ok) throw new Error('open5e http error');
    const classesData = await classesRes.json();
    const racesData = await racesRes.json();

    open5e.classes = (classesData.results || [])
      .map(c => ({name:c.name, slug:c.slug, hit_dice:c.hit_dice, prof_saving_throws:c.prof_saving_throws, spellcasting_ability:c.spellcasting_ability||''}))
      .sort((a,b)=>a.name.localeCompare(b.name));

    // רק גזעי ה-SRD הרשמיים (מדריך השחקן הבסיסי), לא תוכן צד-שלישי
    open5e.races = (racesData.results || [])
      .filter(r => r.document__slug === 'wotc-srd')
      .map(r => ({name:r.name, slug:r.slug, asi_desc:r.asi_desc, speed:r.speed, size:r.size, vision:r.vision, traits:r.traits}))
      .sort((a,b)=>a.name.localeCompare(b.name));

    if(!open5e.classes.length) open5e.classes = OPEN5E_FALLBACK_CLASSES;
    if(!open5e.races.length) open5e.races = OPEN5E_FALLBACK_RACES;

    open5e.status = 'ready';
  }catch(err){
    console.warn('Open5e API fetch failed, using fallback list:', err);
    open5e.classes = OPEN5E_FALLBACK_CLASSES;
    open5e.races = OPEN5E_FALLBACK_RACES;
    open5e.status = 'error';
  }

  if(!state.character.className && open5e.classes.length){
    state.character.className = (open5e.classes.find(c=>c.slug==='wizard') || open5e.classes[0]).name;
  }
  if(!state.character.race && open5e.races.length){
    state.character.race = (open5e.races.find(r=>r.slug==='human') || open5e.races[0]).name;
  }

  applyLevelDerivedStats();
  renderTabs();
  if(!visibleTabs().find(t=>t.id===state.activeTab)) state.activeTab = 'setup';
  renderTabs();
  renderMain();
}

// האם המחלקה הנוכחית מטילה קסמים, לפי הנתון spellcasting_ability שמגיע מ-Open5e (לא ניחוש)
function currentClassIsCaster(){
  const cl = open5e.classes.find(c => c.name === state.character.className);
  if(!cl) return true; // כל עוד לא נבחרה מחלקה, לא מסתירים כלום
  return !!cl.spellcasting_ability;
}

function renderTabs(){
  const nav = document.getElementById('tabNav');
  nav.innerHTML = visibleTabs().map(t => `
    <button class="tab-btn ${state.activeTab===t.id?'active':''}" data-tab="${t.id}" style="color:${state.activeTab===t.id?'':''}">

function renderMain(){
  const main = document.getElementById('mainPane');
  const renderers = {
    setup: renderSetupTab,
    spells: renderSpellsTab,
    fighter: renderFighterTab,
    dice: renderDiceTab,
    resources: renderResourcesTab,
    loot: renderLootTab,
  };
  main.innerHTML = `<section class="pane active" id="pane-${state.activeTab}"></section>`;
  renderers[state.activeTab]();
  saveState();
}

const STORAGE_KEY = 'dnd-helper-state';
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    Object.assign(state, saved);
  }catch(e){}
}

   ========================================================= */
function recommendCheapest(category){
  const candidates = state.spells.filter(s => s.category === category).sort((a,b)=>a.level-b.level);
  for(const sp of candidates){
    if(sp.usesPerDay){
      if((sp.usesUsed||0) < sp.usesPerDay) return {spell: sp, reason:`הטלות ליום (נותרו ${sp.usesPerDay-(sp.usesUsed||0)}/${sp.usesPerDay})`};
      continue;
    }
    if(sp.level === 0) return {spell: sp, reason:'קסם פשוט — ללא עלות בחריצים'};
    const slot = state.slots[sp.level];
    if(slot && slot.used < slot.max) return {spell: sp, reason:`דורש חריץ רמה ${sp.level} (נותרו ${slot.max - slot.used})`};
  }
  const cantrip = candidates.find(s=>s.level===0 && !s.usesPerDay);
  if(cantrip) return {spell: cantrip, reason:'קסם פשוט — ללא עלות בחריצים'};
  return null;
}

/* =========================================================
   2. לוחם — FIGHTER
   ========================================================= */
function attackAverage(a){
  const dieAvg = (a.die+1)/2;
  let base = a.dice*dieAvg + Number(a.mod||0);
  if(a.crit) base = a.dice*2*dieAvg + Number(a.mod||0);
  let bonus = 0;
  if(a.bonusOn && a.bonusDice>0){
    const bDieAvg = (a.bonusDie+1)/2;
    bonus = a.crit ? a.bonusDice*2*bDieAvg : a.bonusDice*bDieAvg;
  }
  return base + bonus;
}
function attackRoll(a){
  let total = 0;
  const rounds = a.crit ? 2 : 1;
  for(let r=0;r<rounds;r++) for(let i=0;i<a.dice;i++) total += rollDie(a.die);
  total += Number(a.mod||0);
  if(a.bonusOn && a.bonusDice>0){
    const brounds = a.crit ? 2 : 1;
    for(let r=0;r<brounds;r++) for(let i=0;i<a.bonusDice;i++) total += rollDie(a.bonusDie);
  }
  return total;
}

    </div>
  `;

  document.getElementById('dxRoll').addEventListener('click', doDiceRoll);

function readDiceInputs(){
  return {
    count: parseInt(document.getElementById('dxCount').value,10)||1,
    side: parseInt(document.getElementById('dxSide').value,10),
    mod: parseInt(document.getElementById('dxMod').value,10)||0,
    mode: document.getElementById('dxMode').value,
  };
}

function rollExpression(count, side){
  let vals=[]; for(let i=0;i<count;i++) vals.push(rollDie(side));
  return vals;
}

function doDiceRoll(){
  const {count, side, mod, mode} = readDiceInputs();
  let vals, total, altVals=null, altTotal=null, chosen;
  vals = rollExpression(count, side); total = vals.reduce((a,b)=>a+b,0) + mod;
  if(mode !== 'normal'){
    altVals = rollExpression(count, side); altTotal = altVals.reduce((a,b)=>a+b,0) + mod;
    if(mode==='adv') chosen = total >= altTotal ? {vals,total} : {vals:altVals,total:altTotal};
    else chosen = total <= altTotal ? {vals,total} : {vals:altVals,total:altTotal};
  } else {
    chosen = {vals, total};
  }

  const tray = document.getElementById('diceTray');
  tray.innerHTML = chosen.vals.map(v=>`<div class="die-face rolling">${v}</div>`).join('') +
    (mod ? `<div class="die-face" style="border-color:var(--gold-dim);color:var(--gold-bright);">${mod>0?'+':''}${mod}</div>` : '');

  let extra = '';
  if(mode !== 'normal'){
    extra = `<div class="footnote">הטלה חלופית (${mode==='adv'?'לא נבחרה כי נמוכה יותר':'לא נבחרה כי גבוהה יותר'}): ${altVals.join(', ')} ${mod?`(+${mod})`:''} = ${altTotal}</div>`;
  }

  document.getElementById('dxResultBox').innerHTML = `
    <div class="result-box">
      <div class="stat"><div class="num">${chosen.total}</div><div class="lbl">תוצאה סופית</div></div>
      <div class="stat"><div class="num" style="font-size:15px; color:var(--ink-dim);">${chosen.vals.join(' + ')}${mod?` + ${mod}`:''}</div><div class="lbl">פירוט</div></div>
    </div>
    ${extra}
  `;

  state.diceHistory.unshift({count,side,mod,mode,total:chosen.total});
  state.diceHistory = state.diceHistory.slice(0,10);
  saveState();
}

function doSimulate(){
  const {count, side, mod, mode} = readDiceInputs();
  const trials = 20000;
  let sum = 0; const freq = {};
  for(let t=0;t<trials;t++){
    let total = rollExpression(count,side).reduce((a,b)=>a+b,0) + mod;
    if(mode !== 'normal'){
      const alt = rollExpression(count,side).reduce((a,b)=>a+b,0) + mod;
      total = mode==='adv' ? Math.max(total,alt) : Math.min(total,alt);
    }
    sum += total;
    freq[total] = (freq[total]||0)+1;
  }
  const simAvg = sum/trials;
  const theoAvg = count*(side+1)/2 + mod;

  const totals = Object.keys(freq).map(Number).sort((a,b)=>a-b);
  const maxFreq = Math.max(...Object.values(freq));
  const step = Math.max(1, Math.ceil(totals.length/22));
  let histHtml = '';
  for(let i=0;i<totals.length;i+=step){
    const v = totals[i];
    const c = freq[v];
    histHtml += `<div class="hist-bar-row">
      <div class="hist-label">${v}</div>
      <div class="hist-track"><div class="hist-fill" style="width:${(c/maxFreq*100).toFixed(1)}%"></div></div>
      <div class="hist-count">${(c/trials*100).toFixed(1)}%</div>
    </div>`;
  }

  document.getElementById('dxSimResult').innerHTML = `
    <div class="result-box">
      <div class="stat"><div class="num">${theoAvg.toFixed(2)}</div><div class="lbl">ממוצע תאורטי (מצב רגיל)</div></div>
      <div class="stat"><div class="num">${simAvg.toFixed(2)}</div><div class="lbl">ממוצע מדומה (${mode==='normal'?'רגיל':mode==='adv'?'יתרון':'חיסרון'}, ${trials.toLocaleString()} הטלות)</div></div>
    </div>
    <div style="margin-top:12px;">${histHtml}</div>
    <div class="footnote">ההפרש בין הממוצע התאורטי לממוצע במצב יתרון/חיסרון נובע מבחירת הטובה/הגרועה מבין שתי הטלות מלאות.</div>
  `;
}

/* =========================================================
   5. משאבים — HP / חיזוק / קוביות חיים
   ========================================================= */
function renderResourcesTab(){
  const pane = document.getElementById('pane-resources');
  const r = state.resources;
  const hpPct = clamp(r.hpCur/r.hpMax*100,0,100);

  pane.innerHTML = `
    <h2 class="pane-title">משאבי דמות ${state.character.name?'— '+esc(state.character.name):''}</h2>
    <p class="pane-note">עקוב אחרי נקודות חיים וחיזוק זמני. חיים מקסימליים נקבעים ב<a href="#" id="goSetupTop" style="color:var(--gold-bright);">הגדרת דמות</a>.</p>

    <div class="card">
      <h3>נקודות חיים</h3>
      <div class="resource-bar-big"><div class="resource-bar-big-fill" style="width:${hpPct}%; background:var(--nature);"></div></div>
      <div style="display:flex; justify-content:space-between; margin:8px 0 14px; font-family:var(--font-mono);">
        <span>${r.hpCur} / ${r.hpMax}</span>
        <span style="color:var(--utility);">חיזוק זמני: ${r.hpTemp}</span>
      </div>
      <div class="row">
        <div><label class="field-label">כמות</label><input type="number" id="rHpAmount" value="5" min="0"></div>
      </div>
      <div class="row" style="margin-top:8px;">
        <button class="btn danger" id="rDamage" style="flex:1;">פגיעה</button>
        <button class="btn success" id="rHeal" style="flex:1;">ריפוי</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <div><label class="field-label">הוסף חיזוק זמני</label><input type="number" id="rTempAmount" value="5"></div>
        <div><button class="btn" id="rAddTemp" style="width:100%;">הוסף</button></div>
      </div>
      <div class="row" style="margin-top:14px;">
        <button class="btn" id="rShortRest" style="flex:1;">מנוחה קצרה</button>
        <button class="btn success" id="rLongRest" style="flex:1;">מנוחה ארוכה</button>
      </div>
      <p class="footnote">מנוחה כאן משפיעה על כל הדמות — חיים, חריצי קסם ויכולות מיוחדות כאחד.</p>
    </div>
  `;

  document.getElementById('goSetupTop').addEventListener('click', (e)=>{ e.preventDefault(); goToTab('setup'); });

  document.getElementById('rDamage').addEventListener('click', ()=>{
    let amt = parseInt(document.getElementById('rHpAmount').value,10)||0;
    if(r.hpTemp>0){ const used = Math.min(r.hpTemp, amt); r.hpTemp -= used; amt -= used; }
    r.hpCur = clamp(r.hpCur-amt,0,r.hpMax); renderResourcesTab();
  });
  document.getElementById('rHeal').addEventListener('click', ()=>{
    const amt = parseInt(document.getElementById('rHpAmount').value,10)||0;
    r.hpCur = clamp(r.hpCur+amt,0,r.hpMax); renderResourcesTab();
  });
  document.getElementById('rAddTemp').addEventListener('click', ()=>{
    const amt = parseInt(document.getElementById('rTempAmount').value,10)||0;
    r.hpTemp = Math.max(r.hpTemp, amt); renderResourcesTab();
  });
  document.getElementById('rShortRest').addEventListener('click', doShortRest);
  document.getElementById('rLongRest').addEventListener('click', doLongRest);

  saveState();
}

/* =========================================================
   6. שלל וזהב
   ========================================================= */
function renderLootTab(){
  const pane = document.getElementById('pane-loot');
  const invValue = state.inventory.reduce((s,i)=>s+i.value*i.qty,0);
  const coinValueInGold = state.gold + state.silver/10 + state.copper/100;
  const totalWealth = coinValueInGold + invValue;

  pane.innerHTML = `
    <h2 class="pane-title">שלל וזהב</h2>
    <p class="pane-note">נהל את ארנק הדמות ואת פריטי השלל שנאספו — כולל מכירה מהירה תמורת זהב.</p>

    <div class="grid2">
      <div class="card">
        <h3>ארנק <small>עושר כולל (מטבעות + שלל): ${totalWealth.toFixed(2)} ז"ז</small></h3>
        <div class="row" style="margin-bottom:14px;">
          <div style="text-align:center;">
            <div style="font-family:var(--font-mono); font-size:26px; color:var(--gold-bright);">${state.gold}</div>
            <div class="field-label">זהב (ז"ז)</div>
          </div>
          <div style="text-align:center;">
            <div style="font-family:var(--font-mono); font-size:26px; color:#c8ccd6;">${state.silver}</div>
            <div class="field-label">כסף (כ"ז)</div>
          </div>
          <div style="text-align:center;">
            <div style="font-family:var(--font-mono); font-size:26px; color:#c2793f;">${state.copper}</div>
            <div class="field-label">נחושת (נ"ז)</div>
          </div>
        </div>
        <div class="row">
          <div><label class="field-label">מטבע</label>
            <select id="gdCoin">
              <option value="gold">זהב</option>
              <option value="silver">כסף</option>
              <option value="copper">נחושת</option>
            </select>
          </div>
          <div><label class="field-label">כמות</label><input type="number" id="gdAmount" value="10" min="0"></div>
          <div><button class="btn danger" id="gdSpend" style="width:100%;">הוצא</button></div>
          <div><button class="btn success" id="gdAdd" style="width:100%;">קבל</button></div>
        </div>
        <div class="footnote">שווי הפריטים בתרמיל: ${invValue} ז"ז</div>
      </div>

      <div class="card">
        <h3>תרמיל השלל</h3>
        <div class="row">
          <div style="flex:2"><label class="field-label">שם הפריט</label><input type="text" id="ltName" placeholder="למשל: חרב קסומה"></div>
          <div><label class="field-label">כמות</label><input type="number" id="ltQty" value="1" min="1"></div>
          <div><label class="field-label">שווי ליחידה (לא חובה)</label><input type="number" id="ltValue" placeholder="0"></div>
          <div><button class="btn gold" id="ltAdd" style="width:100%;">הוסף</button></div>
        </div>
        <div style="margin-top:12px;">
          ${state.inventory.length ? state.inventory.map(i=>`
            <div class="loot-item">
              <span class="grow">${esc(i.name)} ${i.qty>1?`<span style="color:var(--ink-faint)">×${i.qty}</span>`:''}</span>
              <span style="font-family:var(--font-mono); color:var(--gold-bright);">${i.value} ז"ז ליח'</span>
              <button class="btn small gold" data-sell="${i.id}">מכור הכול</button>
              <button class="icon-btn" data-del-loot="${i.id}">✕</button>
            </div>
          `).join('') : `<div class="empty-state">התרמיל ריק.</div>`}
        </div>
      </div>
    </div>
  `;

  document.getElementById('gdAdd').addEventListener('click', ()=>{
    const coin = document.getElementById('gdCoin').value;
    const amt = parseInt(document.getElementById('gdAmount').value,10)||0;
    state[coin] += amt; renderLootTab();
  });
  document.getElementById('gdSpend').addEventListener('click', ()=>{
    const coin = document.getElementById('gdCoin').value;
    const amt = parseInt(document.getElementById('gdAmount').value,10)||0;
    state[coin] = Math.max(0, state[coin]-amt); renderLootTab();
  });

  document.getElementById('ltAdd').addEventListener('click', ()=>{
    const name = document.getElementById('ltName').value.trim();
    if(!name) return;
    state.inventory.push({
      id: uid(), name,
      qty: parseInt(document.getElementById('ltQty').value,10)||1,
      value: parseInt(document.getElementById('ltValue').value,10)||0,
    });
    renderLootTab();
  });
  pane.querySelectorAll('[data-del-loot]').forEach(b=>b.addEventListener('click', ()=>{
    state.inventory = state.inventory.filter(i=>i.id!==b.dataset.delLoot); renderLootTab();
  }));
  pane.querySelectorAll('[data-sell]').forEach(b=>b.addEventListener('click', ()=>{
    const item = state.inventory.find(i=>i.id===b.dataset.sell);
    if(!item) return;
    state.gold += item.value*item.qty;
    state.inventory = state.inventory.filter(i=>i.id!==item.id);
    renderLootTab();
  }));

  saveState();
}

/* =========================================================
   INIT
   ========================================================= */
loadState();
applyLevelDerivedStats();
renderTabs();
renderMain();
loadOpen5eData();
</script>
</body>
</html>
